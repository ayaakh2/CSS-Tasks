<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Task3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


    <title>Task3</title>

</head>
<body>
    <div class="container1">
        <div class="card1">
            <div class="card1__title">Sign Up</div>
            <div class="card1__row">
                <input type="text" class="input12" placeholder="First Name">
                <input type="text" class="input12" placeholder="Last Name">
            </div>
            <input type="email" class="input1" placeholder="Email">
            <input type="password" class="input1" placeholder="Password">
            <input type="password" class="input1" placeholder="Confirm Password">
            <div class="label1">
                <input type="checkbox" >
                <label >I accept the Terms of Use & Privacy Policy</label>
            </div>
            <button class="btn1">Sign Up</button>
            <div class="card1__text">Already have an account? <u>Login here</u></div>
            <div class="card1__text">Copyright &copy; YourCompany.com</div>
        </div>
    </div>

    <br>
    <br>



    <div class="container2">
        <div class="card2">
            <div class="image-sec">
                <img class="image2" src="https://cdn-icons-png.flaticon.com/512/432/432787.png">
            </div>
            <div class="form">
                <div class="card2__title">Member Login</div>
                <div class="input__container">
                    <i class="fa-sharp fa-solid fa-envelope"></i>
                    <input type="email" class="input2" placeholder="Email">   
                </div>
                <div class="input__container">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" class="input2" placeholder="password">   
                </div>
                <button class="btn2">Login</button>
                <div class="card2__text">Forgot <span class="card2__link">Username/Password?</span></div>
                <div class="card2__link">Create your account <i class="fa-solid fa-right-long"></i></div>
            </div>
        </div>
    </div>
</body>
</html>
